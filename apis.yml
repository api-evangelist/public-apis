apis:
  - aid: public-apis:public-apis-directory
    name: Public APIs Directory
    description: >-
      A collective list of free APIs organized by category including Animals, Finance, Weather, Geocoding, Government,
      Health, Machine Learning, Sports, and 40+ more categories for developers to discover and integrate into their
      projects.
    humanURL: https://github.com/public-apis/public-apis
