  - aid: public-apis:public-api
    name: Public APIs API
    description: >-
      A RESTful API for programmatically accessing the public-apis directory data. Supports CORS and requires no
      authentication, with all responses served over HTTPS. Endpoints include /entries, /random, /categories, and
      /health.
    humanURL: https://github.com/davemachado/public-api
