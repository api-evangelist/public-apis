aid: public-apis
name: Public APIs
description: >-
  Public APIs is a community-curated collective list of over 1,400 free APIs organized across 50+ categories, maintained
  by contributors and the team at APILayer. It is one of the most popular open-source projects on GitHub with over 400k
  stars. A companion REST API (davemachado/public-api) exposes the directory data programmatically over HTTPS with no
  authentication.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
